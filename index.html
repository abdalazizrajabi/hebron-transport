<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hebron Smart Mobility — Digital Twin</title>
    <!-- Leaflet CSS CDN — required for map rendering -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      @keyframes ambulance-ring {
        0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.6), 0 0 0 0 rgba(239,68,68,0.3); }
        50%       { box-shadow: 0 0 0 10px rgba(239,68,68,0.2), 0 0 0 20px rgba(239,68,68,0.05); }
      }
      .ambulance-ring { animation: ambulance-ring 1.2s ease-in-out infinite; }

      @keyframes log-slide {
        from { opacity: 0; transform: translateY(-6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .log-entry { animation: log-slide 0.3s ease-out; }

      .leaflet-popup-content-wrapper {
        border-radius: 10px !important;
        box-shadow: 0 8px 30px rgba(0,0,0,0.08) !important;
        border: 1px solid #f1f5f9 !important;
        padding: 0 !important;
      }
      .leaflet-popup-content { margin: 0 !important; }
      .leaflet-popup-tip-container { display: none; }

      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
